<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三月花事</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0b0b0c;
    color: #fff;
}

header {
    text-align: center;
    padding: 30px 10px 10px;
}

h1 {
    font-size: 26px;
    margin: 0;
}

.subtitle {
    font-size: 14px;
    color: #aaa;
    margin-top: 6px;
}

.container {
    padding: 10px;
}

.student {
    margin-bottom: 30px;
}

.student h2 {
    font-size: 18px;
    margin: 10px 0;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
    <h1>三月花事</h1>
    <div class="subtitle">春天被他们留在了镜头里</div>
</header>

<div class="container" id="container"></div>

<script>
/**
 * 👉 这里改（唯一需要你动的地方）
 * folder = 文件夹名字（必须和 images 里面一致）
 * count = 这个同学有多少张图片
 */
const data = [
  { id: 1, folder: "任相宇", count: 10 },
  { id: 2, folder: "侯凯耀", count: 8 },
  { id: 3, folder: "储鸿哲", count: 10 },
  { id: 4, folder: "刘书豪", count: 9 },
  { id: 5, folder: "刘孜成", count: 10 },
  { id: 6, folder: "孟军", count: 6 },
  { id: 7, folder: "张传厚", count: 7 },
  { id: 8, folder: "张柯凡", count: 5 },
  { id: 9, folder: "张琰", count: 6 },
  { id: 10, folder: "李婧昱", count: 8 },
  { id: 11, folder: "段芝慧", count: 3 },
  { id: 12, folder: "洪涛", count: 9 },
  { id: 13, folder: "潘骏聪", count: 6 },
  { id: 14, folder: "王定中", count: 5 },
  { id: 15, folder: "王晨旭", count: 7 },
  { id: 16, folder: "王辰瑜", count: 6 },
  { id: 17, folder: "赵佳怡", count: 10 },
  { id: 18, folder: "郭贝贝", count: 8 }
];

const container = document.getElementById("container");

data.forEach(s => {
    let html = `<div class="student">
        <h2>${s.id}号作品</h2>
        <div class="gallery">`;

    for (let i = 1; i <= s.count; i++) {
        html += `<img src="images/${s.folder}/${i}.jpg">`;
    }

    html += `</div></div>`;

    container.innerHTML += html;
});
</script>

</body>
</html>
