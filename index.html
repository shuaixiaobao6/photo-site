<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三月花事</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #141418;
      --panel-2: #1b1b21;
      --text: #f5f5f7;
      --muted: #a7a7b3;
      --accent: #f3c97a;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 10px 28px rgba(0,0,0,0.28);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(243,201,122,0.08), transparent 30%),
        linear-gradient(180deg, #0a0a0c 0%, #0d0d10 100%);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      text-align: center;
      padding: 22px 10px 30px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hero p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 2.2vw, 18px);
    }

    .hint {
      margin: 16px auto 0;
      width: fit-content;
      max-width: 100%;
      color: #d7d7de;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
    }

    .section {
      margin-top: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 18px 16px 18px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-bar {
      width: 4px;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd98e, #e7ae43);
      flex: 0 0 auto;
    }

    .section-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      white-space: nowrap;
    }

    .section-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .nav-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.15);
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    .track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      padding: 4px 2px 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.18) transparent;
    }

    .track::-webkit-scrollbar {
      height: 8px;
    }

    .track::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
    }

    .track::-webkit-scrollbar-track {
      background: transparent;
    }

    .card {
      flex: 0 0 280px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.14);
    }

    .media {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #111;
      overflow: hidden;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caption {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      padding: 12px 10px;
      font-size: 15px;
      color: #e7e7ee;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 2px 2px;
    }

    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .viewer.show {
      display: flex;
    }

    .viewer-inner {
      position: relative;
      width: min(96vw, 1400px);
      height: min(92vh, 900px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      background: #111;
    }

    .viewer-close,
    .viewer-nav {
      position: absolute;
      border: none;
      cursor: pointer;
      color: #fff;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .viewer-close:hover,
    .viewer-nav:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .viewer-close {
      top: 10px;
      right: 10px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 22px;
    }

    .viewer-nav {
      top: 50%;
      transform: translateY(-50%);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 24px;
    }

    .viewer-nav:hover {
      transform: translateY(-50%) scale(1.02);
    }

    .viewer-prev {
      left: 10px;
    }

    .viewer-next {
      right: 10px;
    }

    .viewer-meta {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f5f5f7;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .page {
        padding: 20px 12px 40px;
      }

      .section {
        padding: 14px 12px 14px;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        align-self: flex-end;
      }

      .card {
        flex-basis: 72vw;
        max-width: 320px;
      }

      .caption {
        font-size: 14px;
      }

      .viewer-nav {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>三月花事</h1>
      <p>春天被他们留在了镜头里</p>
      <div class="hint">左右滑动浏览每位同学的作品，点击图片可放大查看</div>
    </header>

    <main id="gallery"></main>
  </div>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer-inner">
      <button class="viewer-close" id="viewerClose" aria-label="关闭">×</button>
      <button class="viewer-nav viewer-prev" id="viewerPrev" aria-label="上一张">‹</button>
      <img id="viewerImg" alt="作品预览" />
      <button class="viewer-nav viewer-next" id="viewerNext" aria-label="下一张">›</button>
      <div class="viewer-meta" id="viewerMeta"></div>
    </div>
  </div>

  <script>
    // 按你的当前 GitHub 根目录结构填写文件夹名
    const folders = [
       "向旭锦", "潘骏聪", "张传厚", "任相宇", "洪涛", "段芝慧",  "侯凯耀", "储鸿哲", "刘书豪", "刘孜成", "孟军",
       "张柯凡", "张琰", "李婧昱", 
       "王定中", "王晨旭", "王辰瑜", "赵佳怡", "郭贝贝"
     
    ];

    const gallery = document.getElementById('gallery');
    const viewer = document.getElementById('viewer');
    const viewerImg = document.getElementById('viewerImg');
    const viewerMeta = document.getElementById('viewerMeta');
    const viewerClose = document.getElementById('viewerClose');
    const viewerPrev = document.getElementById('viewerPrev');
    const viewerNext = document.getElementById('viewerNext');

    const groups = [];
    let currentGroup = 0;
    let currentImage = 0;

    function openViewer(groupIndex, imageIndex) {
      currentGroup = groupIndex;
      currentImage = imageIndex;
      updateViewer();
      viewer.classList.add('show');
      viewer.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
      viewer.classList.remove('show');
      viewer.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function updateViewer() {
      const group = groups[currentGroup];
      if (!group || !group.images.length) return;
      const src = group.images[currentImage];
      viewerImg.src = src;
      viewerMeta.textContent = `${currentGroup + 1}号同学 · 第${currentImage + 1}张 / 共${group.images.length}张`;
    }

    function showPrev() {
      const group = groups[currentGroup];
      if (!group || !group.images.length) return;
      currentImage = (currentImage - 1 + group.images.length) % group.images.length;
      updateViewer();
    }

    function showNext() {
      const group = groups[currentGroup];
      if (!group || !group.images.length) return;
      currentImage = (currentImage + 1) % group.images.length;
      updateViewer();
    }

    viewerClose.addEventListener('click', closeViewer);
    viewerPrev.addEventListener('click', showPrev);
    viewerNext.addEventListener('click', showNext);
    viewer.addEventListener('click', (e) => {
      if (e.target === viewer) closeViewer();
    });

    document.addEventListener('keydown', (e) => {
      if (!viewer.classList.contains('show')) return;
      if (e.key === 'Escape') closeViewer();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });

    function createSection(group, groupIndex) {
      const section = document.createElement('section');
      section.className = 'section';

      const head = document.createElement('div');
      head.className = 'section-head';

      const titleWrap = document.createElement('div');
      titleWrap.className = 'title-wrap';

      const titleBar = document.createElement('div');
      titleBar.className = 'title-bar';

      const title = document.createElement('h2');
      title.className = 'section-title';
      title.textContent = `${groupIndex + 1}号同学`;

      const count = document.createElement('div');
      count.className = 'section-count';
      count.textContent = `${group.images.length} 张作品`;

      titleWrap.appendChild(titleBar);
      titleWrap.appendChild(title);
      titleWrap.appendChild(count);

      const toolbar = document.createElement('div');
      toolbar.className = 'toolbar';

      const prev = document.createElement('button');
      prev.className = 'nav-btn';
      prev.type = 'button';
      prev.textContent = '‹';

      const next = document.createElement('button');
      next.className = 'nav-btn';
      next.type = 'button';
      next.textContent = '›';

      const track = document.createElement('div');
      track.className = 'track';

      prev.addEventListener('click', () => {
        track.scrollBy({ left: -340, behavior: 'smooth' });
      });

      next.addEventListener('click', () => {
        track.scrollBy({ left: 340, behavior: 'smooth' });
      });

      toolbar.appendChild(prev);
      toolbar.appendChild(next);

      head.appendChild(titleWrap);
      head.appendChild(toolbar);

      section.appendChild(head);

      if (!group.images.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '暂无可展示作品';
        section.appendChild(empty);
        return section;
      }

      group.images.forEach((src, imageIndex) => {
        const card = document.createElement('article');
        card.className = 'card';

        const media = document.createElement('div');
        media.className = 'media';

        const img = document.createElement('img');
        img.src = src;
        img.alt = `${groupIndex + 1}号同学作品 ${imageIndex + 1}`;
        img.loading = 'lazy';

        media.appendChild(img);
        card.appendChild(media);

        const caption = document.createElement('div');
        caption.className = 'caption';
        caption.textContent = `${groupIndex + 1}号同学 · 第${imageIndex + 1}张`;
        card.appendChild(caption);

        card.addEventListener('click', () => openViewer(groupIndex, imageIndex));
        track.appendChild(card);
      });

      section.appendChild(track);
      return section;
    }

    async function collectImages(folderName) {
      const results = [];
      for (let i = 1; i <= 10; i++) {
        const encoded = encodeURIComponent(folderName);
        const src = `${encoded}/${i}.jpg`;
        const ok = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.src = src;
        });
        if (!ok) break;
        results.push(src);
      }
      return results;
    }

    async function init() {
      for (const folder of folders) {
        const images = await collectImages(folder);
        groups.push({ folder, images });
      }

      groups.forEach((group, index) => {
        gallery.appendChild(createSection(group, index));
      });
    }

    init();
  </script>
</body>
</html>
