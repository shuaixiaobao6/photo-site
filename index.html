<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三月花事</title>

<style>
    body {
        margin: 0;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #0d0d0d;
        color: #fff;
    }

    h1 {
        text-align: center;
        margin-top: 40px;
        font-size: 42px;
        letter-spacing: 2px;
    }

    p.subtitle {
        text-align: center;
        color: #aaa;
        margin-bottom: 40px;
    }

    .gallery {
        width: 90%;
        margin: auto;
    }

    .section {
        margin-bottom: 60px;
    }

    .section h2 {
        margin-bottom: 20px;
        border-left: 4px solid #ffcc70;
        padding-left: 10px;
        font-weight: 500;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
    }

    .card {
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 30px rgba(255, 200, 120, 0.2);
    }

    .card img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        display: block;
    }

    .author {
        padding: 10px;
        font-size: 14px;
        color: #ccc;
        text-align: center;
    }

    /* 点击放大 */
    .viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
    }

    .viewer img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 10px;
    }

</style>
</head>

<body>

<h1>三月花事</h1>
<p class="subtitle">春天被他们留在了镜头里</p>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
    <img id="viewerImg">
</div>

<script>

// 👇 只需要改这里（名字列表）
const authors = [
"任相宇","侯凯耀","储鸿哲","刘书豪","刘孜成","孟军",
"张传厚","张柯凡","张琰","李婧昱","段芝慧","洪涛",
"潘骏聪","王定中","王晨旭","王辰瑜","赵佳怡","郭贝贝"
];

// 自动加载图片（无需 count）
const gallery = document.getElementById("gallery");

authors.forEach(author => {

    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("h2");
    title.innerText = author;
    section.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    let i = 1;

    function loadNext() {
        const img = new Image();
        img.src = `${encodeURIComponent(author)}/${i}.jpg`;

        img.onload = () => {
            const card = document.createElement("div");
            card.className = "card";

            img.onclick = () => {
                document.getElementById("viewer").style.display = "flex";
                document.getElementById("viewerImg").src = img.src;
            };

            card.appendChild(img);

            const name = document.createElement("div");
            name.className = "author";
            name.innerText = `${author} · ${i}`;
            card.appendChild(name);

            grid.appendChild(card);

            i++;
            loadNext(); // 递归加载下一张
        };

        img.onerror = () => {
            // 没有更多图片了，停止
        };
    }

    loadNext();

    section.appendChild(grid);
    gallery.appendChild(section);

});

</script>

</body>
</html>
